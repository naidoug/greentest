<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green$ Proto</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Stop mobile browser interference */
        * { touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { margin: 0; background: #fff; overflow: hidden; height: 100vh; }
        .phone-screen { position: relative; width: 100vw; height: 100vh; background-color: #000; }
        
        img { width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0; pointer-events: none; }

        /* The Sliding Menu */
        #menu-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: auto;
            transform: translateY(100%); /* Start hidden */
            transition: transform 0.4s cubic-bezier(0.33, 1, 0.68, 1);
            z-index: 500; /* Higher than home screen */
        }

        #menu-layer img { width: 100%; height: auto; display: block; }

        /* Hotspots */
        .hotspot { position: absolute; cursor: pointer; }
        /* Keep red to verify; change to transparent later */
        .debug { background: rgba(255, 0, 0, 0.6); border: 2px solid red; }

        /* 1. Open Button (Must be HIGHEST z-index initially) */
        #btn-open-menu { bottom: 2%; left: 35%; width: 30%; height: 12%; z-index: 9999; }
        
        /* 2. Menu Buttons (Inside the menu) */
        #btn-to-qr     { bottom: 25%; left: 35%; width: 30%; height: 20%; z-index: 600; }
        #btn-close-x   { top: 5%; right: 5%; width: 15%; height: 10%; z-index: 600; }

        /* 3. QR Layer */
        #img-qr { z-index: 1000; display: none; pointer-events: auto; }
    </style>
</head>
<body>

<div class="phone-screen">
    <img src="home.png" id="img-home">

    <div id="menu-layer">
        <img src="MenuButtons.png">
        <div id="btn-to-qr" class="hotspot debug" onclick="showQR(event)"></div>
        <div id="btn-close-x" class="hotspot debug" onclick="hideMenu(event)"></div>
    </div>

    <img src="qr.png" id="img-qr" onclick="hideQR()">

    <div id="btn-open-menu" class="hotspot debug" onclick="showMenu()"></div>
</div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    const menu = document.getElementById('menu-layer');
    const qr = document.getElementById('img-qr');
    const openBtn = document.getElementById('btn-open-menu');

    function showMenu() {
        menu.style.transform = "translateY(0)";
        openBtn.style.display = "none"; // Hide the home button so it doesn't block menu clicks
    }

    function hideMenu(e) {
        if(e) e.stopPropagation();
        menu.style.transform = "translateY(100%)";
        openBtn.style.display = "block"; // Bring home button back
    }

    function showQR(e) {
        if(e) e.stopPropagation();
        qr.style.display = "block";
    }

    function hideQR() {
        qr.style.display = "none";
        hideMenu();
    }
</script>
</body>
</html>
