<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green$ Proto</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        /* Change background to white to avoid 'blackout' */
        body { margin: 0; background: #fff; overflow: hidden; height: 100vh; }
        .phone-screen { position: relative; width: 100vw; height: 100vh; }
        
        img { 
            width: 100%; height: 100%; object-fit: contain; 
            position: absolute; top: 0; left: 0; pointer-events: none; 
        }

        /* Semi-transparent red for aiming. We will hide this later. */
        .hotspot { 
            position: absolute; 
            z-index: 999; 
            background: rgba(255, 0, 0, 0.4); 
            border: 2px solid red;
        }

        /* 1. The GS Logo at the bottom */
        #btn-to-menu { bottom: 8%; left: 40%; width: 25%; height: 12%; }

        /* 2. The Gift Icon (Higher up) */
        #btn-to-qr   { top: 62%; left: 35%; width: 30%; height: 12%; display: none; }

        /* 3. Reset Button (QR screen) - Now a small 'X' zone instead of a full mask */
        #btn-reset   { top: 50%; right: 2%; width: 15%; height: 8%; display: none; }
    </style>
</head>
<body>

<div class="phone-screen">
    <img src="home.png" id="img-home">
    <img src="menu.png" id="img-menu" style="display:none;">
    <img src="qr.png"   id="img-qr"   style="display:none;">

    <div id="btn-to-menu" class="hotspot" onclick="showMenu(event)"></div>
    <div id="btn-to-qr"   class="hotspot" onclick="showQR(event)"></div>
    <div id="btn-reset"   class="hotspot" onclick="showHome(event)"></div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    function showMenu(e) {
        e.preventDefault();
        document.getElementById('img-home').style.display = 'none';
        document.getElementById('img-menu').style.display = 'block';
        document.getElementById('btn-to-menu').style.display = 'none';
        document.getElementById('btn-to-qr').style.display = 'block';
    }

    function showQR(e) {
        e.preventDefault();
        document.getElementById('img-menu').style.display = 'none';
        document.getElementById('img-qr').style.display = 'block';
        document.getElementById('btn-to-qr').style.display = 'none';
        document.getElementById('btn-reset').style.display = 'block';
    }

    function showHome(e) {
        e.preventDefault();
        // Instead of reloading, just reset visibility
        document.getElementById('img-qr').style.display = 'none';
        document.getElementById('img-home').style.display = 'block';
        document.getElementById('btn-reset').style.display = 'none';
        document.getElementById('btn-to-menu').style.display = 'block';
    }
</script>
</body>
</html>
