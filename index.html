<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green$ Proto</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { margin: 0; background: #fff; overflow: hidden; height: 100vh; }
        .phone-screen { position: relative; width: 100vw; height: 100vh; background-color: #000; }
        
        /* Main Home Image */
        #img-home { 
            width: 100%; height: 100%; object-fit: contain; 
            position: absolute; top: 0; left: 0; 
        }

        /* The Sliding Menu Layer */
        #menu-layer {
            position: absolute;
            bottom: -100%; /* Start hidden below the screen */
            left: 0;
            width: 100%;
            height: 100%; /* Matches screen height to keep aspect ratio */
            transition: bottom 0.4s ease-out; /* The slide animation */
            z-index: 20;
        }

        #menu-layer img {
            width: 100%; height: 100%; object-fit: contain;
        }

        /* The QR Code Layer (Instant swap) */
        #img-qr {
            width: 100%; height: 100%; object-fit: contain;
            position: absolute; top: 0; left: 0;
            z-index: 30;
            display: none;
        }

        /* Hotspots */
        .hotspot { position: absolute; z-index: 100; cursor: pointer; }
        .debug { background: rgba(255, 0, 0, 0.4); border: 1px solid red; } /* Change to transparent later */

        /* Positions */
        #btn-open-menu { bottom: 2%; left: 38%; width: 24%; height: 11%; }
        #btn-to-qr     { top: 62%; left: 38%; width: 24%; height: 12%; }
        #btn-close-x   { top: 59%; right: 7%; width: 12%; height: 6%; }
        #btn-reset-qr  { top: 0; left: 0; width: 100%; height: 100%; }

    </style>
</head>
<body>

<div class="phone-screen">
    <img src="home.png" id="img-home">

    <div id="menu-layer">
        <img src="MenuButton.png">
        <div id="btn-to-qr" class="hotspot debug" onclick="showQR(event)"></div>
        <div id="btn-close-x" class="hotspot debug" onclick="hideMenu(event)"></div>
    </div>

    <img src="qr.png" id="img-qr" onclick="hideQR()">

    <div id="btn-open-menu" class="hotspot debug" onclick="showMenu()"></div>
</div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    const menu = document.getElementById('menu-layer');
    const qr = document.getElementById('img-qr');

    function showMenu() {
        menu.style.bottom = "0"; // Slides the menu up
    }

    function hideMenu(e) {
        if(e) e.stopPropagation();
        menu.style.bottom = "-100%"; // Slides the menu back down
    }

    function showQR(e) {
        e.stopPropagation();
        qr.style.display = "block";
    }

    function hideQR() {
        qr.style.display = "none";
        hideMenu(); // Also hide menu so we return to clean home screen
    }
</script>
</body>
</html>
