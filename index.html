<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green$ Proto</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { margin: 0; background: #fff; overflow: hidden; height: 100vh; }
        .phone-screen { position: relative; width: 100vw; height: 100vh; background-color: #000; }
        
        /* Base Home Image */
        #img-home { 
            width: 100%; height: 100%; object-fit: contain; 
            position: absolute; top: 0; left: 0; 
        }

        /* The Sliding Menu Layer */
        #menu-layer {
            position: absolute;
            /* FIX: Start fully hidden below the bottom edge */
            bottom: -100%; 
            left: 0;
            width: 100%;
            height: 100%; 
            transition: bottom 0.4s ease-out; 
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Pushes the image to the bottom of this container */
        }

        #menu-layer img {
            width: 100%;
            height: auto; /* Maintains aspect ratio */
            display: block;
        }

        /* Hotspots */
        .hotspot { position: absolute; z-index: 100; cursor: pointer; }
        .debug { background: rgba(255, 0, 0, 0.4); border: 1px solid red; }

        /* Button positions RELATIVE to the bottom-aligned menu */
        #btn-open-menu { bottom: 2%; left: 38%; width: 24%; height: 11%; }
        
        /* These two are now measured from the BOTTOM of the screen */
        #btn-to-qr     { bottom: 23%; left: 38%; width: 24%; height: 12%; }
        #btn-close-x   { bottom: 35%; right: 7%; width: 12%; height: 6%; }

        /* QR Layer */
        #img-qr {
            width: 100%; height: 100%; object-fit: contain;
            position: absolute; top: 0; left: 0;
            z-index: 30;
            display: none;
        }
    </style>
</head>
<body>

<div class="phone-screen">
    <img src="home.png" id="img-home">

    <div id="menu-layer">
        <img src="MenuButtons.png">
        <div id="btn-to-qr" class="hotspot debug" onclick="showQR(event)"></div>
        <div id="btn-close-x" class="hotspot debug" onclick="hideMenu(event)"></div>
    </div>

    <img src="qr.png" id="img-qr" onclick="hideQR()">

    <div id="btn-open-menu" class="hotspot debug" onclick="showMenu()"></div>
</div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    const menu = document.getElementById('menu-layer');
    const qr = document.getElementById('img-qr');

    function showMenu() {
        // This brings the bottom of the menu-layer (and the image inside) 
        // to exactly the bottom of the phone screen.
        menu.style.bottom = "0"; 
    }

    function hideMenu(e) {
        if(e) e.stopPropagation();
        menu.style.bottom = "-100%"; 
    }

    function showQR(e) {
        e.stopPropagation();
        qr.style.display = "block";
    }

    function hideQR() {
        qr.style.display = "none";
        hideMenu();
    }
</script>
</body>
</html>
