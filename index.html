<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green$ Proto</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { margin: 0; background: #fff; overflow: hidden; height: 100vh; }
        .phone-screen { position: relative; width: 100vw; height: 100vh; background-color: #000; }
        
        #img-home { width: 100%; height: 100%; object-fit: contain; position: absolute; z-index: 1; }

        /* The Menu Layer */
        #menu-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            /* Height is set to auto to wrap the image exactly */
            height: auto; 
            /* Start it hidden below the bottom edge */
            transform: translateY(100%); 
            transition: transform 0.4s cubic-bezier(0.33, 1, 0.68, 1); 
            z-index: 20;
        }

        #menu-layer img {
            width: 100%;
            height: auto;
            display: block;
            /* Prevents the image from being 'pushed' out of its box */
            pointer-events: none; 
        }

        /* Hotspots */
        .hotspot { position: absolute; z-index: 100; cursor: pointer; }
        .debug { background: rgba(255, 0, 0, 0.4); border: 1px solid red; }

        /* 1. Open Button (on Home screen) */
        #btn-open-menu { bottom: 2%; left: 38%; width: 24%; height: 11%; z-index: 10; }
        
        /* 2. Menu Buttons (Inside the Menu Layer) */
        /* Measured as percentage of the MenuButtons image height */
        #btn-to-qr     { bottom: 25%; left: 38%; width: 24%; height: 25%; }
        #btn-close-x   { top: 5%; right: 5%; width: 15%; height: 15%; }

        /* QR Layer */
        #img-qr { width: 100%; height: 100%; object-fit: contain; position: absolute; z-index: 50; display: none; }
    </style>
</head>
<body>

<div class="phone-screen">
    <img src="home.png" id="img-home">

    <div id="menu-layer">
        <img src="MenuButtons.png">
        <div id="btn-to-qr" class="hotspot debug" onclick="showQR(event)"></div>
        <div id="btn-close-x" class="hotspot debug" onclick="hideMenu(event)"></div>
    </div>

    <img src="qr.png" id="img-qr" onclick="hideQR()">

    <div id="btn-open-menu" class="hotspot debug" onclick="showMenu()"></div>
</div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    const menu = document.getElementById('menu-layer');
    const qr = document.getElementById('img-qr');

    function showMenu() {
        // This slides the menu up so its bottom meets the screen bottom
        menu.style.transform = "translateY(0)"; 
    }

    function hideMenu(e) {
        if(e) e.stopPropagation();
        // This slides it back down out of view
        menu.style.transform = "translateY(100%)"; 
    }

    function showQR(e) {
        if(e) e.stopPropagation();
        qr.style.display = "block";
    }

    function hideQR() {
        qr.style.display = "none";
        hideMenu();
    }
</script>
</body>
</html>
