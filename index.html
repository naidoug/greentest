<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green$ Proto</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { margin: 0; background: #fff; overflow: hidden; height: 100vh; }
        .phone-screen { position: relative; width: 100vw; height: 100vh; background-color: #000; }
        
        #img-home { width: 100%; height: 100%; object-fit: contain; position: absolute; }

        /* FIX: The Menu Layer now sits at the bottom, hidden by a transform */
        #menu-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            /* Start translated down by 100% of its own height */
            transform: translateY(100%); 
            transition: transform 0.4s cubic-bezier(0.33, 1, 0.68, 1); 
            z-index: 20;
        }

        #menu-layer img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Hotspots */
        .hotspot { position: absolute; z-index: 100; cursor: pointer; }
        /* Keep red to verify position, then change to transparent */
        .debug { background: rgba(255, 0, 0, 0.4); border: 1px solid red; }

        /* 1. Open Button (on the Home screen) */
        #btn-open-menu { bottom: 2%; left: 38%; width: 24%; height: 11%; }
        
        /* 2. Menu Buttons (Inside the sliding layer) */
        /* These are % of the MenuButtons.png height */
        #btn-to-qr     { bottom: 23%; left: 38%; width: 24%; height: 12%; }
        #btn-close-x   { bottom: 35%; right: 7%; width: 12%; height: 6%; }

        #img-qr { width: 100%; height: 100%; object-fit: contain; position: absolute; z-index: 30; display: none; }
    </style>
</head>
<body>

<div class="phone-screen">
    <img src="home.png" id="img-home">

    <div id="menu-layer">
        <img src="MenuButtons.png">
        <div id="btn-to-qr" class="hotspot debug" onclick="showQR(event)"></div>
        <div id="btn-close-x" class="hotspot debug" onclick="hideMenu(event)"></div>
    </div>

    <img src="qr.png" id="img-qr" onclick="hideQR()">

    <div id="btn-open-menu" class="hotspot debug" onclick="showMenu()"></div>
</div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    const menu = document.getElementById('menu-layer');
    const qr = document.getElementById('img-qr');

    function showMenu() {
        // Moves the layer to its natural position (bottom: 0)
        menu.style.transform = "translateY(0)"; 
    }

    function hideMenu(e) {
        if(e) e.stopPropagation();
        menu.style.transform = "translateY(100%)"; 
    }

    function showQR(e) {
        e.stopPropagation();
        qr.style.display = "block";
    }

    function hideQR() {
        qr.style.display = "none";
        hideMenu();
    }
</script>
</body>
</html>
