<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green$ Proto</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2e7d32">

    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; overflow: hidden; height: 100vh; }
        .phone-screen { position: relative; width: 100vw; max-width: 500px; height: 100vh; background: #fff; }
        
        img { 
            width: 100%; height: 100%; object-fit: contain; 
            position: absolute; top: 0; left: 0; 
            transition: opacity 0.3s ease; 
        }

        .hidden { opacity: 0; pointer-events: none; }
        .visible { opacity: 1; pointer-events: auto; }

        /* Hotspots */
        .hotspot { position: absolute; cursor: pointer; z-index: 10; }
        .debug { background: transparent; } /* Change to rgba(255,0,0,0.3) to see buttons */

        /* 1. GS Logo (Bottom Center) */
        #btn-to-menu { bottom: 2%; left: 35%; width: 30%; height: 12%; }
        
        /* 2. X Button (Bottom Center) */
        #btn-close { bottom: 2%; left: 35%; width: 30%; height: 12%; display: none; }

        /* 3. Gift Icon (Center) */
        #btn-to-qr { top: 60%; left: 35%; width: 30%; height: 15%; display: none; }

        /* 4. Global Reset (Click anywhere on QR) */
        #btn-reset { top: 0; left: 0; width: 100%; height: 100%; display: none; }
    </style>
</head>
<body>

<div class="phone-screen">
    <img src="home.png" id="img-home" class="visible">
    <img src="menu.png" id="img-menu" class="hidden">
    <img src="qr.png"   id="img-qr"   class="hidden">

    <div id="btn-to-menu" class="hotspot debug" onclick="showMenu()"></div>
    <div id="btn-close"   class="hotspot debug" onclick="showHome()"></div>
    <div id="btn-to-qr"   class="hotspot debug" onclick="showQR()"></div>
    <div id="btn-reset"   class="hotspot debug" onclick="showHome()"></div>
</div>

<script>
    const imgs = { home: 'img-home', menu: 'img-menu', qr: 'img-qr' };
    const btns = { toMenu: 'btn-to-menu', close: 'btn-close', toQr: 'btn-to-qr', reset: 'btn-reset' };

    function toggle(id, show) {
        const el = document.getElementById(id);
        if (el.tagName === 'IMG') {
            el.className = show ? 'visible' : 'hidden';
        } else {
            el.style.display = show ? 'block' : 'none';
        }
    }

    function showMenu() {
        toggle(imgs.home, false); toggle(imgs.menu, true);
        toggle(btns.toMenu, false); toggle(btns.close, true); toggle(btns.toQr, true);
    }

    function showHome() {
        toggle(imgs.home, true); toggle(imgs.menu, false); toggle(imgs.qr, false);
        toggle(btns.toMenu, true); toggle(btns.close, false); toggle(btns.toQr, false); toggle(btns.reset, false);
    }

    function showQR() {
        toggle(imgs.menu, false); toggle(imgs.qr, true);
        toggle(btns.close, false); toggle(btns.toQr, false); toggle(btns.reset, true);
    }
</script>

</body>
</html>
