<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green$ Proto</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; }
        .phone-screen { position: relative; width: 100vw; height: 100vh; background: #fff; }
        
        /* Background Home Image */
        #img-home { width: 100%; height: 100%; object-fit: contain; position: absolute; z-index: 1; }

        /* Dark Overlay when menu is open */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 10; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }

        /* The Sliding Menu Buttons */
        #menu-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: auto;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 20; display: flex; flex-direction: column;
        }
        #menu-container img { width: 100%; height: auto; display: block; }

        /* QR Image Layer */
        #img-qr { 
            width: 100%; height: 100%; object-fit: contain; position: absolute; 
            top: 0; left: 0; z-index: 100; display: none; background: #fff;
        }

        /* Hotspots */
        .hotspot { position: absolute; cursor: pointer; }
        /* Set to transparent and remove border once aligned */
        .debug { background: rgba(255, 0, 0, 0.4); border: 2px solid red; }

        /* 1. GS Circle on Home Screen */
        #btn-open { bottom: 2%; left: 35%; width: 30%; height: 12%; z-index: 5; }

        /* 2. Gift Icon (Inside Menu Container) */
        #btn-gift { bottom: 22%; left: 35%; width: 30%; height: 15%; z-index: 25; }

        /* 3. Close 'X' (Inside Menu Container) */
        #btn-close { top: 5%; right: 5%; width: 15%; height: 10%; z-index: 25; }
    </style>
</head>
<body>

<div class="phone-screen">
    <img src="home.png" id="img-home">
    <div id="btn-open" class="hotspot debug" onclick="toggleMenu(true)"></div>

    <div id="overlay" onclick="toggleMenu(false)"></div>

    <div id="menu-container">
        <img src="MenuButtons.png" onerror="alert('MenuButtons.png missing!')">
        <div id="btn-gift" class="hotspot debug" onclick="showQR()"></div>
        <div id="btn-close" class="hotspot debug" onclick="toggleMenu(false)"></div>
    </div>

    <img src="qr.png" id="img-qr" onclick="hideQR()">
</div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    const menu = document.getElementById('menu-container');
    const overlay = document.getElementById('overlay');
    const qr = document.getElementById('img-qr');

    function toggleMenu(isOpen) {
        menu.style.transform = isOpen ? "translateY(0)" : "translateY(100%)";
        overlay.style.opacity = isOpen ? "1" : "0";
        overlay.style.pointerEvents = isOpen ? "auto" : "none";
    }

    function showQR() {
        qr.style.display = "block";
    }

    function hideQR() {
        qr.style.display = "none";
        toggleMenu(false); // Close menu when returning from QR
    }
</script>

</body>
</html>
