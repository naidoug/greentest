<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green$ Proto</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* FIX 1: Disable double-tap-to-zoom for instant clicks */
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; background: #000; display: flex; justify-content: center; overflow: hidden; height: 100vh; }
        .phone-screen { position: relative; width: 100vw; max-width: 500px; height: 100vh; }
        img { width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0; pointer-events: none; }
        
        .hotspot { position: absolute; z-index: 10; cursor: pointer; }
        /* Set to 'rgba(255,0,0,0.5)' to see the buttons during adjustment */
        .debug { background: rgba(255, 0, 0, 0.4); } 

        #btn-to-menu { bottom: 2%; left: 38%; width: 24%; height: 11%; }
        #btn-to-qr   { top: 65%; left: 38%; width: 24%; height: 12%; display: none; }
        #btn-reset   { top: 0; left: 0; width: 100%; height: 100%; display: none; }
    </style>
</head>
<body>

<div class="phone-screen">
    <img src="home.png" id="img-home">
    <img src="menu.png" id="img-menu" style="display:none;">
    <img src="qr.png"   id="img-qr"   style="display:none;">

    <div id="btn-to-menu" class="hotspot debug" ontouchend="showMenu()"></div>
    <div id="btn-to-qr"   class="hotspot debug" ontouchend="showQR()"></div>
    <div id="btn-reset"   class="hotspot debug" ontouchend="showHome()"></div>
</div>

<script>
    // FIX 2: Register the Service Worker to enable "Standalone" mode (hides address bar)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    const home = document.getElementById('img-home');
    const menu = document.getElementById('img-menu');
    const qr   = document.getElementById('img-qr');
    const btnMenu = document.getElementById('btn-to-menu');
    const btnQr   = document.getElementById('btn-to-qr');
    const btnReset = document.getElementById('btn-reset');

    function showMenu() {
        home.style.display = 'none';
        menu.style.display = 'block';
        btnMenu.style.display = 'none';
        btnQr.style.display = 'block';
    }

    function showQR() {
        menu.style.display = 'none';
        qr.style.display = 'block';
        btnQr.style.display = 'none';
        btnReset.style.display = 'block';
    }

    function showHome() {
        qr.style.display = 'none';
        home.style.display = 'block';
        btnReset.style.display = 'none';
        btnMenu.style.display = 'block';
    }
</script>
</body>
</html>
